name: Enable HTTPS

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  actions: write
  pages: write

jobs:
  enable-https:
    runs-on: ubuntu-latest
    steps:
      - name: Enable HTTPS when the certificate is ready
        env:
          GH_TOKEN: ${{ secrets.PAGES_ADMIN_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: |
          current=$(curl --silent --fail-with-body \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/pages")

          if echo "${current}" | grep --quiet '"https_enforced":true'; then
            echo "HTTPS is already enabled."
          else
            status=$(curl --silent --output /tmp/response.json --write-out "%{http_code}" \
              --request PUT \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPOSITORY}/pages" \
              --data '{"https_enforced":true}')

            if [ "${status}" != "204" ]; then
              echo "Certificate is not ready yet. GitHub will retry in 15 minutes."
              cat /tmp/response.json
              exit 0
            fi

            echo "HTTPS is now enabled."
          fi

          curl --silent --fail-with-body \
            --request PUT \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/actions/workflows/enable-https.yml/disable"
          echo "Automatic HTTPS checks are now disabled."
